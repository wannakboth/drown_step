name: drone_step
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.7.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.1.0
  google_mobile_ads: ^9.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/click.wav
    - assets/audio/success.wav
    - assets/audio/pickup.wav
    - assets/audio/crash.wav
    - assets/audio/flying.wav
    - assets/audio/departure.mp3
    - assets/audio/construct.mp3

